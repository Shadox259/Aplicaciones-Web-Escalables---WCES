<section class="container">
  <div class="form-container" style="max-width: 400px; margin: 2rem auto;">
    <h2 class="section-title">Crear Cuenta</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onCreateAccount()">
      
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" formControlName="name" class="form-control" placeholder="Tu nombre">
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" formControlName="email" class="form-control" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Mínimo 6 caracteres">
      </div>

      <button type="submit" class="btn" [disabled]="registerForm.invalid" style="width: 100%;">
        Registrarse
      </button>

    </form>
    
    <p style="text-align: center; margin-top: 1rem;">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</section>
